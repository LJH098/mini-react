<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Cafe Community Demo</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap");
      :root {
        color-scheme: light;
        --primary: #173829;
        --primary-soft: #2e4f3f;
        --secondary-chip: #d7e4c7;
        --page-bg: #f9f9f7;
        --surface-low: #f4f4f2;
        --surface-card: #ffffff;
        --ink: #1a1c1b;
        --muted: #5f6661;
        --outline-soft: rgba(65, 72, 68, 0.16);
        --outline-ghost: rgba(65, 72, 68, 0.08);
        --ambient-shadow: 0 20px 40px rgba(23, 56, 41, 0.06);
      }

      html {
        -webkit-text-size-adjust: 100%;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        line-height: 1.6;
        font-family: "Noto Sans KR", "Pretendard", sans-serif;
        word-break: keep-all;
        overflow-wrap: break-word;
        background:
          radial-gradient(circle at 12% 10%, rgba(46, 79, 63, 0.08), transparent 32%),
          radial-gradient(circle at 84% 88%, rgba(86, 98, 75, 0.08), transparent 34%),
          var(--page-bg);
      }

      p,
      li,
      span,
      strong,
      h1,
      h2,
      h3,
      h4,
      button,
      a {
        word-break: keep-all;
        overflow-wrap: break-word;
      }

      #app {
        width: 100%;
      }

      .page-shell {
        max-width: 1440px;
        margin: 0 auto;
        padding: 24px 20px 48px;
        display: grid;
        gap: 18px;
      }

      .topbar,
      .hero,
      .sidebar-card,
      .board-card,
      .detail-card,
      .preview-card,
      .footer-card {
        background: var(--surface-card);
        border: 1px solid var(--outline-ghost);
        border-radius: 8px;
        box-shadow: var(--ambient-shadow);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 20px 24px;
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(16px);
      }

      .brand-block {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .brand-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 96px;
        padding: 10px 14px;
        border-radius: 999px;
        background: linear-gradient(132deg, var(--primary), var(--primary-soft));
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .brand-copy {
        display: grid;
        gap: 4px;
      }

      .brand-copy strong {
        font-size: 20px;
        letter-spacing: -0.02em;
        font-family: "Cinzel", "Noto Serif KR", serif;
        color: var(--primary);
      }

      .brand-copy span {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        word-break: keep-all;
      }

      .topbar-tools {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .search-shell {
        width: min(420px, 48vw);
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 999px;
        background: var(--surface-low);
        border: 1px solid transparent;
      }

      .search-shell input {
        width: 100%;
        border: 0;
        outline: none;
        background: transparent;
        color: var(--ink);
        font: inherit;
      }

      .search-shell span {
        color: var(--muted);
        font-size: 13px;
      }

      .user-chip {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        background: var(--secondary-chip);
        color: var(--primary);
        font-size: 14px;
        font-weight: 700;
      }

      .primary-button,
      .ghost-button,
      .soft-button,
      .chip-button,
      .like-button {
        appearance: none;
        border: 0;
        cursor: pointer;
        font: inherit;
        transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      }

      .primary-button:hover,
      .ghost-button:hover,
      .soft-button:hover,
      .chip-button:hover,
      .like-button:hover {
        transform: translateY(-1px);
      }

      .primary-button {
        padding: 11px 17px;
        border-radius: 6px;
        background: linear-gradient(130deg, var(--primary), var(--primary-soft));
        color: #fff;
        font-weight: 700;
        box-shadow: var(--ambient-shadow);
      }

      .ghost-button {
        padding: 12px 18px;
        border-radius: 6px;
        background: var(--surface-low);
        border: 1px solid var(--outline-ghost);
        color: var(--ink);
        font-weight: 700;
      }

      .soft-button {
        padding: 10px 14px;
        border-radius: 6px;
        background: var(--secondary-chip);
        color: var(--primary);
        font-weight: 700;
      }

      .chip-button {
        padding: 10px 14px;
        border-radius: 999px;
        background: var(--surface-low);
        border: 1px solid transparent;
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
      }

      .chip-button.active {
        background: var(--secondary-chip);
        border-color: rgba(23, 56, 41, 0.2);
        color: var(--primary);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(0, 0.9fr);
        gap: 18px;
        padding: 24px;
      }

      .hero-copy,
      .hero-preview {
        display: grid;
        gap: 16px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        width: fit-content;
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--secondary-chip);
        color: var(--primary);
        font-size: 13px;
        font-weight: 700;
      }

      .hero-copy h1,
      .board-header h2,
      .detail-card h3,
      .sidebar-card h3 {
        margin: 0;
      }

      .hero-copy h1 {
        font-size: clamp(28px, 3.6vw, 40px);
        line-height: 1.24;
        letter-spacing: -0.03em;
        font-family: "Cinzel", "Noto Serif KR", serif;
        color: var(--primary);
      }

      .hero-copy p,
      .muted {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
        word-break: keep-all;
      }

      .hero-actions,
      .hero-stats,
      .toolbar-row,
      .sort-row,
      .action-row,
      .detail-actions,
      .detail-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .stat-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 11px 13px;
        border-radius: 6px;
        background: var(--surface-low);
        border: 1px solid transparent;
      }

      .stat-pill strong {
        font-size: 15px;
      }

      .stat-pill span {
        color: var(--muted);
        font-size: 13px;
      }

      .preview-list {
        display: grid;
        gap: 12px;
      }

      .preview-card {
        padding: 15px 16px;
        background: var(--surface-low);
      }

      .preview-card strong,
      .post-row strong,
      .detail-title {
        display: block;
        margin-bottom: 6px;
      }

      .preview-meta,
      .post-meta,
      .detail-meta,
      .composer-meta,
      .footer-card p {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
        word-break: keep-all;
      }

      .service-grid {
        display: grid;
        grid-template-columns: 250px minmax(0, 1fr) 360px;
        gap: 18px;
        align-items: start;
      }

      .sidebar-stack,
      .main-stack,
      .detail-stack {
        display: grid;
        gap: 18px;
      }

      .sidebar-card,
      .board-card,
      .detail-card,
      .footer-card {
        padding: 20px;
      }

      .sidebar-card h3,
      .board-header p,
      .detail-card p {
        margin: 0;
      }

      .sidebar-card h3 {
        font-size: 18px;
        line-height: 1.35;
        letter-spacing: -0.02em;
      }

      .menu-list,
      .post-list {
        display: grid;
        gap: 10px;
      }

      .menu-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        width: 100%;
        padding: 11px 14px;
        border-radius: 14px;
        border: 1px solid transparent;
        background: transparent;
        color: inherit;
        font: inherit;
        cursor: pointer;
        text-align: left;
      }

      .menu-item span:first-child {
        font-weight: 600;
      }

      .menu-item.active {
        background: var(--surface-low);
        border-color: rgba(23, 56, 41, 0.15);
      }

      .menu-item span:last-child {
        color: var(--muted);
        font-size: 13px;
      }

      .board-card {
        display: grid;
        gap: 18px;
      }

      .board-header {
        display: grid;
        gap: 10px;
      }

      .board-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .board-title-row h2 {
        font-size: 23px;
        letter-spacing: -0.02em;
      }

      .board-toolbar {
        display: grid;
        gap: 12px;
      }

      .toolbar-row {
        justify-content: space-between;
        align-items: center;
      }

      .toolbar-row .muted strong {
        color: var(--ink);
      }

      .sort-row {
        align-items: center;
      }

      .sort-row > span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .post-row {
        width: 100%;
        border: 1px solid var(--outline-ghost);
        border-radius: 6px;
        background: #fff;
        padding: 15px 16px;
        cursor: pointer;
        text-align: left;
        display: grid;
        gap: 9px;
        transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
      }

      .post-row:hover {
        transform: translateY(-1px);
        border-color: rgba(23, 56, 41, 0.28);
        box-shadow: var(--ambient-shadow);
      }

      .post-row.selected {
        border-color: rgba(23, 56, 41, 0.35);
        box-shadow: var(--ambient-shadow);
      }

      .post-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .category-tag,
      .like-tag,
      .outline-tag {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .category-tag {
        background: var(--secondary-chip);
        color: var(--primary);
      }

      .like-tag {
        background: var(--surface-low);
        color: var(--muted);
      }

      .outline-tag {
        border: 1px solid var(--outline-soft);
        color: var(--muted);
      }

      .post-summary {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
        word-break: keep-all;
      }

      .post-meta,
      .detail-meta,
      .detail-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 14px;
      }

      .detail-card {
        display: grid;
        gap: 18px;
      }

      .detail-title {
        font-size: 25px;
        line-height: 1.34;
        letter-spacing: -0.02em;
      }

      .detail-body {
        margin: 0;
        color: #2c3730;
        line-height: 1.76;
        white-space: pre-wrap;
        word-break: keep-all;
      }

      .detail-divider {
        width: 100%;
        height: 1px;
        background: var(--outline-ghost);
      }

      .detail-actions {
        align-items: center;
      }

      .like-button {
        padding: 12px 16px;
        border-radius: 6px;
        background: var(--surface-low);
        border: 1px solid transparent;
        color: var(--muted);
        font-weight: 700;
      }

      .like-button.active {
        background: var(--secondary-chip);
        border-color: rgba(23, 56, 41, 0.2);
        color: var(--primary);
      }

      .like-button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
        transform: none;
      }

      .empty-state {
        padding: 28px 18px;
        border-radius: 16px;
        border: 1px dashed rgba(65, 72, 68, 0.22);
        background: var(--surface-low);
        display: grid;
        gap: 10px;
        text-align: center;
      }

      .empty-state h3,
      .empty-state p {
        margin: 0;
      }

      .composer-card {
        display: grid;
        gap: 14px;
      }

      .composer-label {
        display: grid;
        gap: 8px;
        font-size: 14px;
        font-weight: 700;
      }

      .composer-input,
      .composer-textarea {
        width: 100%;
        border: 0;
        border-bottom: 1px solid var(--outline-soft);
        border-radius: 0;
        background: transparent;
        padding: 14px 16px;
        color: var(--ink);
        font: inherit;
        outline: none;
      }

      .composer-textarea {
        min-height: 220px;
        resize: vertical;
        line-height: 1.65;
      }

      .composer-input:focus,
      .composer-textarea:focus,
      .search-shell:focus-within {
        border-color: rgba(23, 56, 41, 0.34);
        box-shadow: none;
      }

      .footer-card {
        display: grid;
        gap: 8px;
      }

      .footer-card strong {
        font-size: 15px;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }

      .debug-toggle {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 22;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(23, 56, 41, 0.2);
        background: #fff;
        color: var(--primary);
        font-weight: 700;
        box-shadow: var(--ambient-shadow);
      }

      .debug-panel {
        position: fixed;
        top: 0;
        right: 0;
        z-index: 21;
        width: min(430px, calc(100vw - 20px));
        height: 100vh;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border-left: 1px solid var(--outline-ghost);
        box-shadow: -16px 0 32px rgba(23, 56, 41, 0.12);
        transform: translateX(100%);
        transition: transform 0.22s ease;
        display: grid;
        grid-template-rows: auto auto auto 1fr;
      }

      .debug-panel.open {
        transform: translateX(0);
      }

      .debug-header {
        padding: 16px;
        border-bottom: 1px solid var(--outline-ghost);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .debug-header strong {
        font-size: 15px;
      }

      .debug-status {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 11px;
        font-weight: 700;
        color: #4f5b53;
        background: var(--surface-low);
      }

      .debug-status.live {
        color: var(--primary);
        background: var(--secondary-chip);
      }

      .debug-controls,
      .debug-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--outline-ghost);
      }

      .debug-select,
      .debug-search {
        border: 1px solid var(--outline-ghost);
        border-radius: 6px;
        background: var(--surface-low);
        font: inherit;
        padding: 8px 10px;
        color: var(--ink);
      }

      .debug-select {
        min-width: 98px;
        font-size: 12px;
      }

      .debug-search {
        flex: 1;
        min-width: 150px;
        font-size: 12px;
      }

      .debug-check {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
      }

      .debug-check input {
        margin: 0;
      }

      .debug-tab {
        border-radius: 999px;
        padding: 6px 10px;
        border: 1px solid var(--outline-ghost);
        background: var(--surface-low);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .debug-tab.active {
        border-color: rgba(23, 56, 41, 0.2);
        background: var(--secondary-chip);
        color: var(--primary);
      }

      .debug-content {
        margin: 0;
        padding: 14px 16px 24px;
        overflow: auto;
        font-size: 12px;
        line-height: 1.55;
        background: var(--page-bg);
      }

      .debug-log-list {
        display: grid;
        gap: 10px;
      }

      .debug-log-item {
        border: 1px solid var(--outline-ghost);
        border-radius: 6px;
        padding: 10px;
        background: #fff;
        display: grid;
        gap: 8px;
      }

      .debug-log-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .debug-type {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 10px;
        font-weight: 700;
      }

      .debug-type.action {
        color: var(--primary);
        background: var(--secondary-chip);
      }

      .debug-type.state {
        color: #2466c6;
        background: #eaf2ff;
      }

      .debug-type.effect {
        color: #7543c6;
        background: #efe7ff;
      }

      .debug-type.warn {
        color: #b76512;
        background: #fff1e2;
      }

      .debug-log-time {
        color: var(--muted);
        font-size: 11px;
        font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      }

      .debug-log-message {
        margin: 0;
        color: #2b3830;
      }

      .debug-log-meta {
        margin: 0;
        padding: 8px;
        border-radius: 8px;
        background: var(--surface-low);
        border: 1px solid var(--outline-ghost);
        font-size: 11px;
        line-height: 1.5;
        overflow: auto;
      }

      .debug-empty {
        border: 1px dashed var(--outline-soft);
        border-radius: 12px;
        padding: 14px;
        color: var(--muted);
        text-align: center;
      }

      /* Editorial botanical recreation overrides */
      body {
        background: #eaf4ee;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -2;
        background:
          radial-gradient(circle at 18% 14%, rgba(194, 222, 206, 0.45), transparent 36%),
          radial-gradient(circle at 82% 80%, rgba(172, 204, 185, 0.4), transparent 34%),
          linear-gradient(135deg, #edf8f1 0%, #dff0e5 48%, #d2e8dc 100%);
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          radial-gradient(circle at 14% 12%, rgba(199, 218, 189, 0.22), transparent 34%),
          radial-gradient(circle at 82% 84%, rgba(130, 157, 139, 0.2), transparent 30%),
          linear-gradient(180deg, rgba(9, 18, 14, 0.2), rgba(9, 18, 14, 0.58));
        backdrop-filter: blur(1px);
        animation: ambientPulse 12s ease-in-out infinite alternate;
      }

      .page-shell::before,
      .page-shell::after {
        content: "";
        position: fixed;
        pointer-events: none;
        z-index: -1;
        border-radius: 999px;
        filter: blur(24px);
      }

      .page-shell::before {
        width: 340px;
        height: 340px;
        top: 8%;
        left: 6%;
        background: rgba(215, 228, 199, 0.2);
        animation: orbFloatA 18s ease-in-out infinite;
      }

      .page-shell::after {
        width: 300px;
        height: 300px;
        right: 8%;
        bottom: 8%;
        background: rgba(108, 141, 123, 0.22);
        animation: orbFloatB 16s ease-in-out infinite;
      }

      .page-shell {
        max-width: 1560px;
        gap: 28px;
        padding: 0 24px 56px;
      }

      .page-shell > :not(.debug-toggle):not(.debug-panel) {
        transition: transform 320ms ease;
      }

      .page-shell.debug-open > :not(.debug-toggle):not(.debug-panel) {
        transform: translateX(-380px);
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        border: 0;
        border-radius: 0 0 14px 14px;
        margin: 0 -24px;
        padding: 20px 32px;
        background: rgba(245, 246, 242, 0.9);
        box-shadow: 0 8px 24px rgba(23, 56, 41, 0.08);
        backdrop-filter: blur(14px);
        animation: topbarFade 700ms ease-out both;
      }

      .brand-copy strong,
      .hero-copy h1,
      .board-title-row h2,
      .detail-title,
      .sidebar-card h3 {
        font-family: "Cinzel", "Noto Serif KR", serif;
        font-weight: 600;
      }

      .hero {
        border: 0;
        border-radius: 14px;
        grid-template-columns: minmax(0, 1.4fr) minmax(0, 0.9fr);
        align-items: end;
        background:
          radial-gradient(circle at 16% 22%, rgba(255, 255, 255, 0.34), transparent 40%),
          linear-gradient(118deg, rgba(88, 126, 105, 0.84), rgba(124, 160, 141, 0.78));
        color: #f8fffb;
        padding: 36px;
        box-shadow: 0 32px 64px rgba(12, 28, 21, 0.32);
        overflow: hidden;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: -35% -20%;
        background: linear-gradient(
          120deg,
          transparent 35%,
          rgba(255, 255, 255, 0.2) 50%,
          transparent 65%
        );
        transform: translateX(-40%) rotate(6deg);
        animation: heroShimmer 8.5s linear infinite;
        pointer-events: none;
      }

      .hero-copy h1,
      .hero-copy p,

    <div id="app"></div>

    <script type="module">
      import {
        FunctionComponent,
        elementNode as h,

        useEffect,
        useMemo,
        useRef,

      } from "/src/lib.js";

      const STORAGE_KEY = "mini-react.community-demo.v2";
      const CURRENT_USER = "김민지";
      const COMMUNITY_NAME = "Green Cafe";
      const CATEGORY_ORDER = ["공지", "자유", "질문", "정보", "후기"];
      const SORT_OPTIONS = [
        { id: "latest", label: "최신순" },
        { id: "popular", label: "인기순" },
        { id: "comments", label: "댓글순" },
      ];
      const DEBUG_TYPES = ["ALL", "ACTION", "STATE", "EFFECT", "WARN"];
      const MAX_DEBUG_LOGS = 200;

      function compact(children) {
        return children.filter((child) => child !== null && child !== undefined);
      }

      function formatCount(value) {
        return new Intl.NumberFormat("ko-KR").format(value);
      }

      function formatDateLabel(value) {
        return new Intl.DateTimeFormat("ko-KR", {
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        }).format(new Date(value));
      }

      function formatTimeLabel(value) {
        return new Intl.DateTimeFormat("ko-KR", {
          hour: "2-digit",
          minute: "2-digit",
        }).format(value);
      }

      function formatDebugTimestamp(timestamp) {
        return new Intl.DateTimeFormat("ko-KR", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          fractionalSecondDigits: 3,
        }).format(timestamp);
      }

      function createDefaultPosts() {
        return [
          {
            id: "post-101",
            category: "공지",
            title: "이번 주 스터디는 mini-react 데모 점검 위주로 진행해요",
            body:
              "백엔드 없이도 프론트 화면 전환과 상태 흐름을 설득력 있게 보여주는 것이 목표예요.\n로그인 상태에 따라 글쓰기, 수정, 좋아요가 어떻게 달라지는지 꼭 확인해주세요.",
            author: CURRENT_USER,
            createdAt: "2026-03-30T09:10:00+09:00",
            views: 148,
            likes: 42,
            liked: true,
            comments: 11,
          },
          {
            id: "post-102",
            category: "자유",
            title: "네이버 카페 느낌으로 만든 게시판 UI 레퍼런스 공유",
            body:
              "상단 브랜드 바, 좌측 메뉴, 리스트 밀도, 우측 상세 카드 구성이 꽤 안정적으로 보여요.\n색은 과하지 않게 그린 포인트만 쓰고 배경은 밝게 두는 쪽이 가장 자연스럽더라고요.",
            author: CURRENT_USER,
            createdAt: "2026-03-31T13:24:00+09:00",
            views: 96,
            likes: 17,
            liked: false,
            comments: 4,
          },
          {
            id: "post-103",
            category: "질문",
            title: "좋아요 누르면 인기순 정렬이 바뀌는 것도 보여주면 좋을까요?",
            body:
              "단순 숫자 증가보다, 좋아요 클릭이 리스트 순서에 영향을 주면 keyed diff를 훨씬 자연스럽게 설명할 수 있을 것 같아요.\n그래서 인기순 정렬에서 DOM 재배치가 보이도록 설계해두면 좋습니다.",
            author: CURRENT_USER,
            createdAt: "2026-04-01T08:42:00+09:00",
            views: 63,
            likes: 25,
            liked: false,
            comments: 8,
          },
          {
            id: "post-104",
            category: "정보",
            title: "mock 데이터만으로도 로그인 / 글쓰기 / 수정 흐름 충분히 보여줄 수 있어요",
            body:
              "사용자는 한 명이라고 가정하고, 작성한 글은 모두 내 글로 다루면 됩니다.\n이 방식이면 권한 UI를 프론트 상태만으로도 쉽게 시연할 수 있어요.",
            author: CURRENT_USER,
            createdAt: "2026-03-29T18:20:00+09:00",
            views: 127,
            likes: 31,
            liked: true,
            comments: 6,
          },
          {
            id: "post-105",
            category: "후기",
            title: "직접 만들어보니 useMemo랑 useEffect를 서비스 화면에 녹이는 게 훨씬 좋네요",
            body:
              "기능 데모 패널보다 실제 서비스 화면에서 검색, 정렬, 자동 저장, 상세 패널을 구성하니까 코드도 설명하기 쉬워졌어요.\n과제 발표 때도 사용자 관점으로 흐름을 보여줄 수 있습니다.",
            author: CURRENT_USER,
            createdAt: "2026-03-28T22:05:00+09:00",
            views: 84,
            likes: 14,
            liked: false,
            comments: 3,
          },
        ];
      }

      function sanitizePosts(posts) {
        if (!Array.isArray(posts)) {
          return createDefaultPosts();
        }

        const safePosts = posts.filter((post) => (
          typeof post?.id === "string" &&
          typeof post?.title === "string" &&
          typeof post?.body === "string"
        ));

        return safePosts.length > 0 ? safePosts : createDefaultPosts();
      }

      function loadPersistedState() {
        try {
          const rawValue = localStorage.getItem(STORAGE_KEY);

          if (!rawValue) {
            return {
              isLoggedIn: false,
              posts: createDefaultPosts(),
            };
          }

          const parsed = JSON.parse(rawValue);
          return {
            isLoggedIn: Boolean(parsed?.isLoggedIn),
            posts: sanitizePosts(parsed?.posts),
          };
        } catch {
          return {
            isLoggedIn: false,
            posts: createDefaultPosts(),
          };
        }
      }

      function sortPosts(posts, sortMode) {
        const nextPosts = [...posts];

        nextPosts.sort((left, right) => {
          if (sortMode === "popular") {
            return (
              right.likes - left.likes ||
              new Date(right.createdAt).getTime() - new Date(left.createdAt).getTime()
            );
          }

          if (sortMode === "comments") {
            return (
              right.comments - left.comments ||
              new Date(right.createdAt).getTime() - new Date(left.createdAt).getTime()
            );
          }

          return new Date(right.createdAt).getTime() - new Date(left.createdAt).getTime();
        });

        return nextPosts;
      }

      function TopBar(props) {
        return h("header", { className: "topbar" }, [
          h("div", { className: "brand-block" }, [
            h("span", { className: "brand-badge" }, [t(COMMUNITY_NAME)]),
            h("div", { className: "brand-copy" }, [
              h("strong", {}, [t("우리 동네 프론트엔드 카페")]),
              h("span", {}, [t("로그인, 글쓰기, 수정, 좋아요를 mini-react 상태만으로 보여줍니다.")]),
            ]),
          ]),
          h("div", { className: "topbar-tools" }, compact([
            h("label", { className: "search-shell" }, [
              h("span", {}, [t("검색")]),
              h("input", {
                type: "text",
                value: props.searchQuery,
                placeholder: "제목이나 내용으로 검색해보세요",
                oninput: (event) => props.onSearchChange(event.target.value),
              }, []),
            ]),
            props.isLoggedIn
              ? h("div", { className: "user-chip" }, [t(`${CURRENT_USER} · 로그인 중`)])
              : null,
            h("button", {
              type: "button",
              className: props.isLoggedIn ? "ghost-button" : "primary-button",
              onclick: props.onToggleLogin,
            }, [t(props.isLoggedIn ? "로그아웃" : "로그인 체험")]),
          ])),
        ]);
      }

      function StatPill(props) {
        return h("div", { className: "stat-pill" }, [
          h("strong", {}, [t(props.value)]),
          h("span", {}, [t(props.label)]),
        ]);
      }

      function LoginHero(props) {
        return h("section", { className: "hero" }, [
          h("div", { className: "hero-copy" }, [
            h("span", { className: "eyebrow" }, [t("community preview")]),
            h("h1", {}, [t("로그인하면 글쓰기와 좋아요까지 가능한 게시판 데모가 열립니다.")]),
            h("p", {}, [
              t("백엔드 없이도 로그인 상태, 게시글 권한, 좋아요, 정렬, 검색 흐름을 실제 서비스처럼 시연합니다."),
            ]),
            h("div", { className: "hero-actions" }, [
              h("button", {
                type: "button",
                className: "primary-button",
                onclick: props.onLogin,
              }, [t("로그인하고 둘러보기")]),
            ]),
            h("div", { className: "hero-stats" }, [
              StatPill({ value: formatCount(props.summary.totalPosts), label: "전체 게시글" }),
              StatPill({ value: formatCount(props.summary.totalLikes), label: "누적 좋아요" }),
              StatPill({ value: formatCount(props.summary.totalComments), label: "누적 댓글" }),
            ]),
          ]),
          h("div", { className: "hero-preview" }, [
            h("div", { className: "board-header" }, [
              h("h2", {}, [t("지금 인기 있는 글")]),
              h("p", { className: "muted" }, [t("검색어가 있으면 미리보기 목록도 함께 필터링됩니다.")]),
            ]),
            props.featuredPosts.length > 0
              ? h("div", { className: "preview-list" }, props.featuredPosts.map((post) => (
                h("article", { className: "preview-card" }, [
                  h("span", { className: "category-tag" }, [t(post.category)]),
                  h("strong", {}, [t(post.title)]),
                  h("p", { className: "preview-meta" }, [t(`${formatDateLabel(post.createdAt)} · 좋아요 ${formatCount(post.likes)} · 댓글 ${formatCount(post.comments)}`)]),
                ])
              )))
              : h("article", { className: "preview-card" }, [
                h("strong", {}, [t("검색 결과가 없어요")]),
                h("p", { className: "preview-meta" }, [t("다른 검색어로 바꾸거나 로그인 후 전체 게시판을 둘러보세요.")]),
              ]),
          ]),
        ]);
      }

      function SidebarMenu(props) {

          h("section", { className: "sidebar-card" }, [
            h("h3", {}, [t("카테고리")]),

            h("div", { className: "menu-list" }, props.categories.map((category) => (
              h("button", {
                type: "button",
                className: `menu-item${category === props.selectedCategory ? " active" : ""}`,

                h("span", {}, [t(category)]),
                h("span", {}, [t(formatCount(props.counts[category] ?? 0))]),

          ]),
          h("section", { className: "footer-card" }, [
            h("strong", {}, [t("자동 저장 상태")]),
            h("p", {}, [t(props.saveNotice)]),
          ]),
        ]);

      function BoardToolbar(props) {
        return h("div", { className: "board-toolbar" }, [
          h("div", { className: "toolbar-row" }, [
            h("div", { className: "muted" }, [
              t("현재 "),
              h("strong", {}, [t(props.selectedCategory)]),
              t(" 카테고리에서 "),
              h("strong", {}, [t(formatCount(props.totalCount))]),
              t("개의 글을 보고 있습니다."),

        return h("button", {
          type: "button",
          className: `post-row${props.isSelected ? " selected" : ""}`,
          onclick: props.onSelect,
        }, [
          h("div", { className: "post-header" }, [

            h("span", { className: "like-tag" }, [t(`좋아요 ${formatCount(props.post.likes)}`)]),

          h("strong", {}, [t(props.post.title)]),
          h("p", { className: "post-summary" }, [t(props.post.body.slice(0, 82))]),
          h("div", { className: "post-meta" }, [
            h("span", {}, [t(props.post.author)]),
            h("span", {}, [t(formatDateLabel(props.post.createdAt))]),
            h("span", {}, [t(`조회 ${formatCount(props.post.views)}`)]),

            props.post.liked ? h("span", { className: "outline-tag" }, [t("내가 좋아요함")]) : null,
          ].filter(Boolean)),
        ]);
      }

      function PostList(props) {
        if (props.posts.length === 0) {
          return EmptyState({
            title: "조건에 맞는 게시글이 없어요",
            description: "검색어를 지우거나 다른 카테고리를 선택해보세요.",
          });
        }

        return h("div", { className: "post-list" }, props.posts.map((post) => (
          PostRow({
            post,
            isSelected: post.id === props.selectedPostId,
            onSelect: () => props.onSelectPost(post.id),
          })
        )));
      }

      function LikeButton(props) {
        return h("button", {
          type: "button",
          className: `like-button${props.liked ? " active" : ""}`,
          disabled: !props.isLoggedIn,
          onclick: props.onToggleLike,
          title: props.isLoggedIn ? "좋아요 토글" : "로그인 후 사용할 수 있습니다",
        }, [
          t(props.liked ? `좋아요 취소 · ${formatCount(props.likes)}` : `좋아요 · ${formatCount(props.likes)}`),
        ]);
      }

      function PostDetail(props) {
        if (!props.post) {
          return EmptyState({
            title: "선택된 글이 없어요",
            description: "왼쪽 목록에서 게시글을 선택하면 상세 내용을 볼 수 있습니다.",
          });
        }

        return h("section", { className: "detail-card" }, [
          h("div", { className: "board-header" }, [
            h("span", { className: "category-tag" }, [t(props.post.category)]),
            h("h3", { className: "detail-title" }, [t(props.post.title)]),
            h("div", { className: "detail-meta" }, [
              h("span", {}, [t(props.post.author)]),
              h("span", {}, [t(formatDateLabel(props.post.createdAt))]),
              h("span", {}, [t(`조회 ${formatCount(props.post.views)}`)]),
            ]),
          ]),
          h("p", { className: "detail-body" }, [t(props.post.body)]),
          h("div", { className: "detail-divider" }, []),
          h("div", { className: "detail-stats" }, [
            h("span", { className: "outline-tag" }, [t(`좋아요 ${formatCount(props.post.likes)}`)]),
            h("span", { className: "outline-tag" }, [t(`댓글 ${formatCount(props.post.comments)}`)]),
            props.post.liked ? h("span", { className: "outline-tag" }, [t("현재 사용자가 좋아요를 눌렀습니다")]) : null,
          ].filter(Boolean)),
          h("div", { className: "detail-actions" }, compact([
            LikeButton({
              liked: props.post.liked,
              likes: props.post.likes,
              isLoggedIn: props.isLoggedIn,
              onToggleLike: () => props.onToggleLike(props.post.id),
            }),
            props.isLoggedIn
              ? h("button", {
                type: "button",
                className: "ghost-button",
                onclick: () => props.onOpenEdit(props.post.id),
              }, [t("글 수정")])
              : h("span", { className: "outline-tag" }, [t("로그인 후 수정 가능")]),
          ])),
        ]);
      }

      function ComposerPanel(props) {
        return h("section", { className: "detail-card composer-card" }, [
          h("div", { className: "board-header" }, [
            h("span", { className: "category-tag" }, [t(props.mode === "edit" ? "글 수정" : "새 글 작성")]),
            h("h3", {}, [t(props.mode === "edit" ? "게시글을 수정하고 저장하세요" : "새 게시글을 작성해보세요")]),
            h("p", { className: "composer-meta" }, [t(`카테고리: ${props.categoryLabel} · 작성자: ${CURRENT_USER}`)]),
          ]),
          h("label", { className: "composer-label" }, [
            t("제목"),
            h("input", {
              type: "text",
              className: "composer-input",
              value: props.title,
              placeholder: "게시글 제목을 입력하세요",
              oninput: (event) => props.onTitleChange(event.target.value),
            }, []),
          ]),
          h("label", { className: "composer-label" }, [
            t("본문"),
            h("textarea", {
              className: "composer-textarea",
              value: props.body,
              placeholder: "내용을 입력하세요",
              oninput: (event) => props.onBodyChange(event.target.value),
            }, []),
          ]),
          h("div", { className: "action-row" }, [
            h("button", {
              type: "button",
              className: "primary-button",
              onclick: props.onSave,
            }, [t(props.mode === "edit" ? "수정 저장" : "게시글 발행")]),
            h("button", {
              type: "button",
              className: "ghost-button",
              onclick: props.onCancel,
            }, [t("닫기")]),
          ]),
        ]);
      }

      function EmptyState(props) {
        return h("section", { className: "detail-card empty-state" }, compact([
          h("h3", {}, [t(props.title)]),
          h("p", { className: "muted" }, [t(props.description)]),
          props.actionLabel
            ? h("button", {
              type: "button",
              className: "ghost-button",
              onclick: props.onAction,
            }, [t(props.actionLabel)])
            : null,
        ]));
      }

      function DebugPanel(props) {
        const controlButtons = props.isPaused
          ? h("button", {
            type: "button",
            className: "soft-button",
            onclick: props.onTogglePause,
          }, [t("재개")])
          : h("button", {
            type: "button",
            className: "ghost-button",
            onclick: props.onTogglePause,
          }, [t("일시정지")]);

        return h("aside", {
          className: `debug-panel${props.open ? " open" : ""}`,
        }, [
          h("div", { className: "debug-header" }, [
            h("div", {}, [
              h("strong", {}, [t("런타임 디버그 패널")]),
              h("div", { className: `debug-status${props.isPaused ? "" : " live"}` }, [
                t(props.isPaused ? "PAUSED" : "LIVE"),
              ]),
            ]),
            h("button", {
              type: "button",
              className: "ghost-button",
              onclick: props.onToggle,
            }, [t(props.open ? "닫기" : "열기")]),
          ]),
          h("div", { className: "debug-controls" }, [
            h("select", {
              className: "debug-select",
              value: props.typeFilter,
              onchange: (event) => props.onTypeFilterChange(event.target.value),
            }, props.typeOptions.map((type) => (
              h("option", { value: type }, [t(type)])
            ))),
            h("input", {
              className: "debug-search",
              type: "text",
              value: props.searchQuery,
              placeholder: "로그 메시지 검색",
              oninput: (event) => props.onSearchQueryChange(event.target.value),
            }, []),
            h("label", { className: "debug-check" }, [
              h("input", {
                type: "checkbox",
                checked: props.autoScroll,
                onchange: (event) => props.onAutoScrollChange(event.target.checked),
              }, []),
              t("자동스크롤"),
            ]),
            controlButtons,
            h("button", {
              type: "button",
              className: "ghost-button",
              onclick: props.onClear,
            }, [t("Clear")]),
          ]),
          h("div", { className: "debug-tabs" }, [
            h("button", {
              type: "button",
              className: `debug-tab${props.activeTab === "snapshot" ? " active" : ""}`,
              onclick: () => props.onTabChange("snapshot"),
            }, [t("Snapshot")]),
            h("button", {
              type: "button",
              className: `debug-tab${props.activeTab === "timeline" ? " active" : ""}`,
              onclick: () => props.onTabChange("timeline"),
            }, [t("Timeline")]),
          ]),
          props.activeTab === "snapshot"
            ? h("pre", { className: "debug-content" }, [t(props.debugText)])
            : h("div", { className: "debug-content debug-log-list" }, (
              props.logs.length === 0
                ? [h("div", { className: "debug-empty" }, [t("조건에 맞는 로그가 없습니다.")])]
                : props.logs.map((log) => (
                  h("article", { className: "debug-log-item" }, [
                    h("div", { className: "debug-log-head" }, [
                      h("span", { className: `debug-type ${log.type.toLowerCase()}` }, [t(log.type)]),
                      h("span", { className: "debug-log-time" }, [t(formatDebugTimestamp(log.ts))]),
                    ]),
                    h("p", { className: "debug-log-message" }, [t(log.message)]),
                    h("pre", { className: "debug-log-meta" }, [t(JSON.stringify(log.meta, null, 2))]),
                  ])
                ))
            )),
        ]);
      }

      const persistedState = loadPersistedState();

      const Root = new FunctionComponent((props, { renderChild }) => {
        const [isLoggedIn, setIsLoggedIn] = useState(() => persistedState.isLoggedIn);
        const [posts, setPosts] = useState(() => persistedState.posts);
        const [selectedCategory, setSelectedCategory] = useState("전체");
        const [searchQuery, setSearchQuery] = useState("");
        const [sortMode, setSortMode] = useState("latest");
        const [selectedPostId, setSelectedPostId] = useState(() => persistedState.posts[0]?.id ?? null);
        const [composerMode, setComposerMode] = useState("closed");
        const [draftTitle, setDraftTitle] = useState("");
        const [draftBody, setDraftBody] = useState("");
        const [saveNotice, setSaveNotice] = useState("브라우저에 자동 저장됩니다.");
        const [isDebugPanelOpen, setIsDebugPanelOpen] = useState(false);
        const [debugLogs, setDebugLogs] = useState([]);
        const [isDebugPaused, setIsDebugPaused] = useState(false);
        const [isDebugAutoScroll, setIsDebugAutoScroll] = useState(true);
        const [debugTypeFilter, setDebugTypeFilter] = useState("ALL");
        const [debugSearchQuery, setDebugSearchQuery] = useState("");
        const [debugTab, setDebugTab] = useState("timeline");
        const prevStateRef = useRef(null);

        const categories = useMemo(() => ["전체", ...CATEGORY_ORDER], []);

        const categoryCounts = useMemo(() => {
          const counts = { 전체: posts.length };

          for (const category of CATEGORY_ORDER) {
            counts[category] = posts.filter((post) => post.category === category).length;
          }

          return counts;
        }, [posts]);

        const visiblePosts = useMemo(() => {
          const normalizedQuery = searchQuery.trim().toLowerCase();
          const filteredPosts = posts.filter((post) => {
            const matchesCategory = selectedCategory === "전체" || post.category === selectedCategory;
            const matchesSearch =
              normalizedQuery.length === 0 ||
              post.title.toLowerCase().includes(normalizedQuery) ||
              post.body.toLowerCase().includes(normalizedQuery);

            return matchesCategory && matchesSearch;
          });

          return sortPosts(filteredPosts, sortMode);
        }, [posts, selectedCategory, searchQuery, sortMode]);

        const selectedPost = useMemo(() => (
          posts.find((post) => post.id === selectedPostId) ?? null
        ), [posts, selectedPostId]);

        const featuredPosts = useMemo(() => {
          const sourcePosts = searchQuery.trim().length > 0 ? visiblePosts : posts;
          return sortPosts(sourcePosts, "popular").slice(0, 3);
        }, [posts, visiblePosts, searchQuery]);

        const summary = useMemo(() => ({
          totalPosts: posts.length,
          totalLikes: posts.reduce((sum, post) => sum + post.likes, 0),
          totalComments: posts.reduce((sum, post) => sum + post.comments, 0),
        }), [posts]);

        const filteredDebugLogs = useMemo(() => {
          const normalizedQuery = debugSearchQuery.trim().toLowerCase();

          return debugLogs.filter((log) => {
            const matchesType = debugTypeFilter === "ALL" || log.type === debugTypeFilter;
            const messageText = `${log.message} ${JSON.stringify(log.meta ?? {})}`.toLowerCase();
            const matchesSearch = normalizedQuery.length === 0 || messageText.includes(normalizedQuery);
            return matchesType && matchesSearch;
          });
        }, [debugLogs, debugSearchQuery, debugTypeFilter]);

        function appendDebugLog(type, message, meta = {}) {
          if (isDebugPaused) {
            return;
          }

          setDebugLogs((currentLogs) => {
            const nextLog = {
              id: `log-${Date.now()}-${currentLogs.length}`,
              ts: Date.now(),
              type,
              message,
              meta,
            };
            const nextLogs = [...currentLogs, nextLog];
            return nextLogs.length > MAX_DEBUG_LOGS
              ? nextLogs.slice(nextLogs.length - MAX_DEBUG_LOGS)
              : nextLogs;
          });
        }

        useEffect(() => {
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ isLoggedIn, posts }));
            appendDebugLog("EFFECT", "localStorage 저장 완료", {
              storageKey: STORAGE_KEY,
              isLoggedIn,
              postCount: posts.length,
            });
          } catch {
            // Ignore storage errors in the browser demo and keep the UI usable.
            appendDebugLog("WARN", "localStorage 저장 실패", {
              storageKey: STORAGE_KEY,
            });
          }

          setSaveNotice(`자동 저장됨 · ${formatTimeLabel(new Date())}`);
        }, [isLoggedIn, posts]);

        useEffect(() => {
          if (composerMode !== "closed") {
            return;
          }

          if (visiblePosts.length === 0) {
            if (selectedPostId !== null) {
              setSelectedPostId(null);
            }
            return;
          }

          if (!visiblePosts.some((post) => post.id === selectedPostId)) {
            setSelectedPostId(visiblePosts[0].id);
          }
        }, [visiblePosts, selectedPostId, composerMode]);

        useEffect(() => {
          const screenTitle = composerMode === "create"
            ? "새 글 작성"
            : composerMode === "edit"
              ? "게시글 수정"
              : selectedPost?.title ?? props.communityName;

          document.title = `${screenTitle} · ${props.communityName}`;
          appendDebugLog("EFFECT", "document.title 업데이트", {
            screenTitle,
          });

          return () => {
            document.title = `${props.communityName} Demo`;
          };
        }, [composerMode, selectedPost, props.communityName]);

        useEffect(() => {
          const previousState = prevStateRef.current;
          const nextState = {
            isLoggedIn,
            selectedCategory,
            sortMode,
            selectedPostId,
            composerMode,
            totalPosts: posts.length,
            visiblePosts: visiblePosts.length,
            totalLikes: summary.totalLikes,
            selectedPostLikes: selectedPost?.likes ?? null,
            selectedPostLiked: selectedPost?.liked ?? null,
          };

          if (previousState) {
            for (const key of Object.keys(nextState)) {
              if (Object.is(previousState[key], nextState[key])) {
                continue;
              }

              appendDebugLog("STATE", `${key} 변경`, {
                key,
                from: previousState[key],
                to: nextState[key],
              });
            }
          } else {
            appendDebugLog("STATE", "초기 상태 스냅샷 생성", nextState);
          }

          prevStateRef.current = nextState;
        }, [
          isLoggedIn,
          selectedCategory,
          sortMode,
          selectedPostId,
          composerMode,
          posts.length,
          visiblePosts.length,
          summary.totalLikes,
          selectedPost?.likes,
          selectedPost?.liked,
        ]);

        useEffect(() => {
          if (!isDebugPanelOpen || debugTab !== "timeline" || !isDebugAutoScroll) {
            return;
          }

          const logContainer = document.querySelector(".debug-log-list");
          if (logContainer) {
            logContainer.scrollTop = logContainer.scrollHeight;
          }
        }, [isDebugPanelOpen, debugTab, isDebugAutoScroll, filteredDebugLogs]);

        function toggleLogin() {
          setIsLoggedIn((currentValue) => !currentValue);
          setComposerMode("closed");
          setDraftTitle("");
          setDraftBody("");
          appendDebugLog("ACTION", "로그인 토글 버튼 클릭");
        }

        function selectPost(postId) {
          setSelectedPostId(postId);
          setComposerMode("closed");
          appendDebugLog("ACTION", "게시글 선택", { postId });
        }

        function toggleLike(postId) {
          if (!isLoggedIn) {
            setSaveNotice("로그인 후 좋아요를 누를 수 있습니다.");
            appendDebugLog("WARN", "비로그인 상태에서 좋아요 시도", { postId });
            return;
          }

          appendDebugLog("ACTION", "좋아요 토글", { postId });

          setPosts((currentPosts) => currentPosts.map((post) => {
            if (post.id !== postId) {
              return post;
            }

            const nextLiked = !post.liked;

            return {
              ...post,
              liked: nextLiked,
              likes: post.likes + (nextLiked ? 1 : -1),
            };
          }));
        }

        function openCreate() {
          if (!isLoggedIn) {
            setSaveNotice("로그인하면 새 글을 작성할 수 있습니다.");
            appendDebugLog("WARN", "비로그인 상태에서 글쓰기 시도");
            return;
          }

          setComposerMode("create");
          setDraftTitle("");
          setDraftBody("");
          appendDebugLog("ACTION", "글쓰기 패널 열기");
        }

        function openEdit(postId) {
          if (!isLoggedIn) {
            appendDebugLog("WARN", "비로그인 상태에서 글 수정 시도", { postId });
            return;
          }

          const post = posts.find((entry) => entry.id === postId);

          if (!post) {
            return;
          }

          setSelectedPostId(postId);
          setDraftTitle(post.title);
          setDraftBody(post.body);
          setComposerMode("edit");
          appendDebugLog("ACTION", "글 수정 패널 열기", { postId });
        }

        function closeComposer() {
          setComposerMode("closed");
          setDraftTitle("");
          setDraftBody("");
          appendDebugLog("ACTION", "작성 패널 닫기");
        }

        function saveDraft() {
          const normalizedTitle = draftTitle.trim();
          const normalizedBody = draftBody.trim();

          if (!normalizedTitle || !normalizedBody) {
            setSaveNotice("제목과 본문을 모두 입력해주세요.");
            appendDebugLog("WARN", "빈 제목/본문으로 저장 시도");
            return;
          }

          if (composerMode === "edit" && selectedPostId) {
            setPosts((currentPosts) => currentPosts.map((post) => (
              post.id === selectedPostId
                ? {
                  ...post,
                  title: normalizedTitle,
                  body: normalizedBody,
                }
                : post
            )));
            setSaveNotice("게시글을 수정했습니다.");
            setComposerMode("closed");
            appendDebugLog("ACTION", "게시글 수정 저장", {
              postId: selectedPostId,
            });
            return;
          }

          const nextPostId = `post-${Date.now()}`;
          const nextCategory = selectedCategory === "전체" ? "자유" : selectedCategory;

          const nextPost = {
            id: nextPostId,
            category: nextCategory,
            title: normalizedTitle,
            body: normalizedBody,
            author: CURRENT_USER,
            createdAt: new Date().toISOString(),
            views: 0,
            likes: 0,
            liked: false,
            comments: 0,
          };

          setPosts((currentPosts) => [nextPost, ...currentPosts]);
          setSelectedPostId(nextPostId);
          setComposerMode("closed");
          setDraftTitle("");
          setDraftBody("");
          setSaveNotice("새 게시글이 추가되었습니다.");
          appendDebugLog("ACTION", "새 게시글 발행", {
            postId: nextPostId,
            category: nextCategory,
          });
        }

        const currentCategoryLabel = composerMode === "edit"
          ? selectedPost?.category ?? "자유"
          : selectedCategory === "전체"
            ? "자유"
            : selectedCategory;

        const debugSnapshot = {
          isLoggedIn,
          composerMode,
          selectedCategory,
          sortMode,
          searchQuery,
          selectedPostId,
          totalPosts: posts.length,
          totalLikes: summary.totalLikes,
          visiblePosts: visiblePosts.length,
          featuredPosts: featuredPosts.length,
          selectedPostLikes: selectedPost?.likes ?? null,
          selectedPostLiked: selectedPost?.liked ?? null,
          currentCategoryLabel,
          saveNotice,
        };

        return h("div", { className: `page-shell${isDebugPanelOpen ? " debug-open" : ""}` }, compact([
          renderChild(TopBar, {
            isLoggedIn,
            searchQuery,
            onSearchChange: (nextQuery) => {
              appendDebugLog("ACTION", "검색어 변경", {
                from: searchQuery,
                to: nextQuery,
              });
              setSearchQuery(nextQuery);
            },
            onToggleLogin: toggleLogin,
          }),
          !isLoggedIn
            ? renderChild(LoginHero, {
              featuredPosts,
              summary,
              onLogin: toggleLogin,
            })
            : h("div", { className: "service-grid" }, [
              h("aside", { className: "sidebar-stack" }, [
                renderChild(SidebarMenu, {
                  categories,
                  counts: categoryCounts,
                  selectedCategory,
                  onSelectCategory: (nextCategory) => {
                    appendDebugLog("ACTION", "카테고리 변경", {
                      from: selectedCategory,
                      to: nextCategory,
                    });
                    setSelectedCategory(nextCategory);
                  },
                  onOpenCreate: openCreate,
                  isLoggedIn,
                  onToggleLogin: toggleLogin,
                  saveNotice,
                }),
              ]),
              h("section", { className: "main-stack" }, [
                h("section", { className: "board-card" }, [
                  h("div", { className: "board-header" }, [
                    h("div", { className: "board-title-row" }, [
                      h("h2", {}, [t("우리 동네 프론트엔드 게시판")]),
                      h("span", { className: "outline-tag" }, [t(`${props.communityName} demo`) ]),
                    ]),
                    h("p", { className: "muted" }, [t("검색, 정렬, 좋아요, 글쓰기, 수정을 하나의 루트 상태로 관리합니다.")]),
                  ]),
                  renderChild(BoardToolbar, {
                    selectedCategory,
                    totalCount: visiblePosts.length,
                    isLoggedIn,
                    sortMode,
                    sortOptions: SORT_OPTIONS,
                    onSortChange: (nextSortMode) => {
                      appendDebugLog("ACTION", "정렬 변경", {
                        from: sortMode,
                        to: nextSortMode,
                      });
                      setSortMode(nextSortMode);
                    },
                    onOpenCreate: openCreate,
                  }),
                  renderChild(PostList, {
                    posts: visiblePosts,
                    selectedPostId,
                    onSelectPost: selectPost,
                  }),
                ]),
              ]),
              h("aside", { className: "detail-stack" }, [
                composerMode === "closed"
                  ? renderChild(PostDetail, {
                    post: selectedPost,
                    isLoggedIn,
                    onToggleLike: toggleLike,
                    onOpenEdit: openEdit,
                  })
                  : renderChild(ComposerPanel, {
                    mode: composerMode,
                    title: draftTitle,
                    body: draftBody,
                    categoryLabel: currentCategoryLabel,
                    onTitleChange: setDraftTitle,
                    onBodyChange: setDraftBody,
                    onSave: saveDraft,
                    onCancel: closeComposer,
                  }),
              ]),
            ]),
          h("button", {
            type: "button",
            className: "debug-toggle",
            onclick: () => {
              appendDebugLog("ACTION", "디버그 패널 토글", {
                nextOpen: !isDebugPanelOpen,
              });
              setIsDebugPanelOpen((open) => !open);
            },
          }, [t(isDebugPanelOpen ? "디버그 닫기" : "디버그 열기")]),
          renderChild(DebugPanel, {
            open: isDebugPanelOpen,
            onToggle: () => setIsDebugPanelOpen((open) => !open),
            isPaused: isDebugPaused,
            autoScroll: isDebugAutoScroll,
            typeOptions: DEBUG_TYPES,
            typeFilter: debugTypeFilter,
            searchQuery: debugSearchQuery,
            activeTab: debugTab,
            logs: filteredDebugLogs,
            onTypeFilterChange: setDebugTypeFilter,
            onSearchQueryChange: setDebugSearchQuery,
            onAutoScrollChange: setIsDebugAutoScroll,
            onTogglePause: () => setIsDebugPaused((paused) => !paused),
            onClear: () => setDebugLogs([]),
            onTabChange: setDebugTab,
            debugText: JSON.stringify(debugSnapshot, null, 2),
          }),
        ]));
      });

      Root.mount(document.getElementById("app"), {
        communityName: COMMUNITY_NAME,
      });
    </script>
  </body>
</html>
