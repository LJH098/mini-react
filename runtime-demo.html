<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Cafe Community Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Pretendard", "SUIT", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        --green-700: #0f8f4f;
        --green-600: #14a85c;
        --green-500: #1dbf68;
        --green-100: #eaf8ef;
        --green-050: #f4fbf6;
        --line: #e5ebe7;
        --text: #1d2821;
        --muted: #66756b;
        --surface: rgba(255, 255, 255, 0.92);
      }

      html {
        -webkit-text-size-adjust: 100%;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        line-height: 1.5;
        background:
          radial-gradient(circle at top left, rgba(29, 191, 104, 0.08), transparent 28%),
          radial-gradient(circle at bottom right, rgba(17, 120, 70, 0.06), transparent 32%),
          linear-gradient(180deg, #f7faf8 0%, #eef3ef 100%);
      }

      #app {
        width: 100%;
      }

      .page-shell {
        max-width: 1440px;
        margin: 0 auto;
        padding: 24px 20px 48px;
        display: grid;
        gap: 18px;
      }

      .topbar,
      .hero,
      .sidebar-card,
      .board-card,
      .detail-card,
      .preview-card,
      .footer-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: 0 10px 24px rgba(18, 35, 24, 0.05);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px 22px;
      }

      .brand-block {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .brand-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 96px;
        padding: 10px 14px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--green-700), var(--green-500));
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .brand-copy {
        display: grid;
        gap: 4px;
      }

      .brand-copy strong {
        font-size: 20px;
        letter-spacing: -0.02em;
      }

      .brand-copy span {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        word-break: keep-all;
      }

      .topbar-tools {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .search-shell {
        width: min(420px, 48vw);
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 999px;
        background: #fff;
        border: 1px solid var(--line);
      }

      .search-shell input {
        width: 100%;
        border: 0;
        outline: none;
        background: transparent;
        color: var(--text);
        font: inherit;
      }

      .search-shell span {
        color: var(--muted);
        font-size: 13px;
      }

      .user-chip {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        background: var(--green-100);
        color: var(--green-700);
        font-size: 14px;
        font-weight: 700;
      }

      .primary-button,
      .ghost-button,
      .soft-button,
      .chip-button,
      .like-button {
        appearance: none;
        border: 0;
        cursor: pointer;
        font: inherit;
        transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      }

      .primary-button:hover,
      .ghost-button:hover,
      .soft-button:hover,
      .chip-button:hover,
      .like-button:hover {
        transform: translateY(-1px);
      }

      .primary-button {
        padding: 11px 17px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--green-700), var(--green-500));
        color: #fff;
        font-weight: 700;
        box-shadow: 0 10px 18px rgba(20, 168, 92, 0.16);
      }

      .ghost-button {
        padding: 12px 18px;
        border-radius: 999px;
        background: #fff;
        border: 1px solid var(--line);
        color: var(--text);
        font-weight: 700;
      }

      .soft-button {
        padding: 10px 14px;
        border-radius: 14px;
        background: var(--green-100);
        color: var(--green-700);
        font-weight: 700;
      }

      .chip-button {
        padding: 10px 14px;
        border-radius: 999px;
        background: #fff;
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
      }

      .chip-button.active {
        background: var(--green-100);
        border-color: rgba(20, 168, 92, 0.28);
        color: var(--green-700);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(0, 0.9fr);
        gap: 18px;
        padding: 24px;
      }

      .hero-copy,
      .hero-preview {
        display: grid;
        gap: 16px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        width: fit-content;
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--green-100);
        color: var(--green-700);
        font-size: 13px;
        font-weight: 700;
      }

      .hero-copy h1,
      .board-header h2,
      .detail-card h3,
      .sidebar-card h3 {
        margin: 0;
      }

      .hero-copy h1 {
        font-size: clamp(28px, 3.6vw, 40px);
        line-height: 1.24;
        letter-spacing: -0.03em;
      }

      .hero-copy p,
      .muted {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
        word-break: keep-all;
      }

      .hero-actions,
      .hero-stats,
      .toolbar-row,
      .sort-row,
      .action-row,
      .detail-actions,
      .detail-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .stat-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 11px 13px;
        border-radius: 16px;
        background: #fff;
        border: 1px solid var(--line);
      }

      .stat-pill strong {
        font-size: 15px;
      }

      .stat-pill span {
        color: var(--muted);
        font-size: 13px;
      }

      .preview-list {
        display: grid;
        gap: 12px;
      }

      .preview-card {
        padding: 15px 16px;
      }

      .preview-card strong,
      .post-row strong,
      .detail-title {
        display: block;
        margin-bottom: 6px;
      }

      .preview-meta,
      .post-meta,
      .detail-meta,
      .composer-meta,
      .footer-card p {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
        word-break: keep-all;
      }

      .service-grid {
        display: grid;
        grid-template-columns: 250px minmax(0, 1fr) 360px;
        gap: 18px;
        align-items: start;
      }

      .sidebar-stack,
      .main-stack,
      .detail-stack {
        display: grid;
        gap: 18px;
      }

      .sidebar-card,
      .board-card,
      .detail-card,
      .footer-card {
        padding: 20px;
      }

      .sidebar-card h3,
      .board-header p,
      .detail-card p {
        margin: 0;
      }

      .sidebar-card h3 {
        font-size: 18px;
        line-height: 1.35;
        letter-spacing: -0.02em;
      }

      .menu-list,
      .post-list {
        display: grid;
        gap: 10px;
      }

      .menu-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        width: 100%;
        padding: 11px 14px;
        border-radius: 14px;
        border: 1px solid transparent;
        background: transparent;
        color: inherit;
        font: inherit;
        cursor: pointer;
        text-align: left;
      }

      .menu-item span:first-child {
        font-weight: 600;
      }

      .menu-item.active {
        background: var(--green-050);
        border-color: rgba(20, 168, 92, 0.24);
      }

      .menu-item span:last-child {
        color: var(--muted);
        font-size: 13px;
      }

      .board-card {
        display: grid;
        gap: 18px;
      }

      .board-header {
        display: grid;
        gap: 10px;
      }

      .board-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .board-title-row h2 {
        font-size: 23px;
        letter-spacing: -0.02em;
      }

      .board-toolbar {
        display: grid;
        gap: 12px;
      }

      .toolbar-row {
        justify-content: space-between;
        align-items: center;
      }

      .toolbar-row .muted strong {
        color: var(--text);
      }

      .sort-row {
        align-items: center;
      }

      .sort-row > span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .post-row {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #fff;
        padding: 15px 16px;
        cursor: pointer;
        text-align: left;
        display: grid;
        gap: 9px;
        transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
      }

      .post-row:hover {
        transform: translateY(-1px);
        border-color: rgba(20, 168, 92, 0.28);
        box-shadow: 0 14px 24px rgba(18, 35, 24, 0.05);
      }

      .post-row.selected {
        border-color: rgba(20, 168, 92, 0.42);
        box-shadow: 0 12px 24px rgba(20, 168, 92, 0.08);
      }

      .post-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .category-tag,
      .like-tag,
      .outline-tag {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .category-tag {
        background: var(--green-100);
        color: var(--green-700);
      }

      .like-tag {
        background: #f5f7f6;
        color: var(--muted);
      }

      .outline-tag {
        border: 1px solid var(--line);
        color: var(--muted);
      }

      .post-summary {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
        word-break: keep-all;
      }

      .post-meta,
      .detail-meta,
      .detail-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 14px;
      }

      .detail-card {
        display: grid;
        gap: 18px;
      }

      .detail-title {
        font-size: 25px;
        line-height: 1.34;
        letter-spacing: -0.02em;
      }

      .detail-body {
        margin: 0;
        color: #2c3730;
        line-height: 1.76;
        white-space: pre-wrap;
        word-break: keep-all;
      }

      .detail-divider {
        width: 100%;
        height: 1px;
        background: var(--line);
      }

      .detail-actions {
        align-items: center;
      }

      .like-button {
        padding: 12px 16px;
        border-radius: 999px;
        background: #fff;
        border: 1px solid var(--line);
        color: var(--muted);
        font-weight: 700;
      }

      .like-button.active {
        background: #eaf8ef;
        border-color: rgba(20, 168, 92, 0.28);
        color: var(--green-700);
      }

      .like-button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
        transform: none;
      }

      .empty-state {
        padding: 28px 18px;
        border-radius: 16px;
        border: 1px dashed #c9d8ce;
        background: #f9fcfa;
        display: grid;
        gap: 10px;
        text-align: center;
      }

      .empty-state h3,
      .empty-state p {
        margin: 0;
      }

      .composer-card {
        display: grid;
        gap: 14px;
      }

      .composer-label {
        display: grid;
        gap: 8px;
        font-size: 14px;
        font-weight: 700;
      }

      .composer-input,
      .composer-textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #fff;
        padding: 14px 16px;
        color: var(--text);
        font: inherit;
        outline: none;
      }

      .composer-textarea {
        min-height: 220px;
        resize: vertical;
        line-height: 1.65;
      }

      .composer-input:focus,
      .composer-textarea:focus,
      .search-shell:focus-within {
        border-color: rgba(20, 168, 92, 0.34);
        box-shadow: 0 0 0 4px rgba(29, 191, 104, 0.09);
      }

      .footer-card {
        display: grid;
        gap: 8px;
      }

      .footer-card strong {
        font-size: 15px;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }

      .debug-toggle {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 22;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(20, 168, 92, 0.35);
        background: #fff;
        color: var(--green-700);
        font-weight: 700;
        box-shadow: 0 12px 24px rgba(18, 35, 24, 0.12);
      }

      .debug-panel {
        position: fixed;
        top: 0;
        right: 0;
        z-index: 21;
        width: min(430px, calc(100vw - 20px));
        height: 100vh;
        background: rgba(255, 255, 255, 0.97);
        border-left: 1px solid var(--line);
        box-shadow: -16px 0 32px rgba(15, 30, 20, 0.14);
        transform: translateX(100%);
        transition: transform 0.22s ease;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .debug-panel.open {
        transform: translateX(0);
      }

      .debug-header {
        padding: 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .debug-header strong {
        font-size: 15px;
      }

      .debug-content {
        margin: 0;
        padding: 14px 16px 24px;
        overflow: auto;
        font-size: 12px;
        line-height: 1.55;
        background: #fbfdfb;
      }

      @media (max-width: 1180px) {
        .service-grid {
          grid-template-columns: 220px minmax(0, 1fr);
        }

        .detail-stack {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 900px) {
        .hero,
        .service-grid {
          grid-template-columns: 1fr;
        }

        .topbar {
          align-items: stretch;
          flex-direction: column;
        }

        .topbar-tools {
          width: 100%;
          flex-direction: column;
          align-items: stretch;
        }

        .search-shell {
          width: 100%;
        }

        .board-title-row,
        .toolbar-row {
          align-items: flex-start;
          flex-direction: column;
        }

        .sidebar-stack {
          gap: 14px;
        }
      }

      @media (max-width: 640px) {
        .page-shell {
          padding: 14px 12px 30px;
          gap: 14px;
        }

        .topbar,
        .hero,
        .sidebar-card,
        .board-card,
        .detail-card,
        .footer-card {
          border-radius: 18px;
        }

        .topbar {
          padding: 16px;
        }

        .hero,
        .sidebar-card,
        .board-card,
        .detail-card,
        .footer-card {
          padding: 16px;
        }

        .brand-block {
          align-items: flex-start;
          flex-direction: column;
          gap: 10px;
        }

        .brand-copy strong {
          font-size: 18px;
        }

        .hero-copy h1 {
          font-size: 27px;
        }

        .board-title-row h2,
        .detail-title {
          font-size: 22px;
        }

        .sidebar-card h3 {
          font-size: 17px;
        }

        .sidebar-card p,
        .footer-card p {
          font-size: 13px;
        }

        .menu-list {
          gap: 8px;
        }

        .menu-item {
          padding: 10px 12px;
        }

        .menu-item span:first-child {
          font-size: 15px;
        }

        .menu-item span:last-child {
          font-size: 12px;
        }

        .primary-button,
        .ghost-button,
        .soft-button,
        .like-button {
          width: 100%;
          justify-content: center;
          text-align: center;
        }

        .detail-actions,
        .action-row {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>

              "기능 데모 패널보다 실제 서비스 화면에서 검색, 정렬, 자동 저장, 상세 패널을 구성하니까 코드도 설명하기 쉬워졌어요.\n과제 발표 때도 사용자 관점으로 흐름을 보여줄 수 있습니다.",
            author: CURRENT_USER,
            createdAt: "2026-03-28T22:05:00+09:00",
            views: 84,
            likes: 14,
            liked: false,
            comments: 3,
          },
        ];
      }

      function sanitizePosts(posts) {
        if (!Array.isArray(posts)) {
          return createDefaultPosts();
        }

        const safePosts = posts.filter((post) => (
          typeof post?.id === "string" &&
          typeof post?.title === "string" &&
          typeof post?.body === "string"
        ));

        return safePosts.length > 0 ? safePosts : createDefaultPosts();
      }

      function loadPersistedState() {
        try {
          const rawValue = localStorage.getItem(STORAGE_KEY);

          if (!rawValue) {
            return {
              isLoggedIn: false,
              posts: createDefaultPosts(),
            };
          }

          const parsed = JSON.parse(rawValue);
          return {
            isLoggedIn: Boolean(parsed?.isLoggedIn),
            posts: sanitizePosts(parsed?.posts),
          };
        } catch {
          return {
            isLoggedIn: false,
            posts: createDefaultPosts(),
          };
        }
      }

      function sortPosts(posts, sortMode) {
        const nextPosts = [...posts];

        nextPosts.sort((left, right) => {
          if (sortMode === "popular") {
            return (
              right.likes - left.likes ||
              new Date(right.createdAt).getTime() - new Date(left.createdAt).getTime()
            );
          }

          if (sortMode === "comments") {
            return (
              right.comments - left.comments ||
              new Date(right.createdAt).getTime() - new Date(left.createdAt).getTime()
            );
          }

          return new Date(right.createdAt).getTime() - new Date(left.createdAt).getTime();
        });

        return nextPosts;
      }

      function DebugPanel(props) {
        return h("aside", {
          className: `debug-panel${props.open ? " open" : ""}`,
        }, [
          h("div", { className: "debug-header" }, [
            h("strong", {}, [t("런타임 디버그 패널")]),

      const persistedState = loadPersistedState();

      const Root = new FunctionComponent((props, { renderChild }) => {
        const [isLoggedIn, setIsLoggedIn] = useState(() => persistedState.isLoggedIn);
        const [posts, setPosts] = useState(() => persistedState.posts);
        const [selectedCategory, setSelectedCategory] = useState("전체");
        const [searchQuery, setSearchQuery] = useState("");
        const [sortMode, setSortMode] = useState("latest");
        const [selectedPostId, setSelectedPostId] = useState(() => persistedState.posts[0]?.id ?? null);
        const [composerMode, setComposerMode] = useState("closed");
        const [draftTitle, setDraftTitle] = useState("");
        const [draftBody, setDraftBody] = useState("");
        const [saveNotice, setSaveNotice] = useState("브라우저에 자동 저장됩니다.");
        const [isDebugPanelOpen, setIsDebugPanelOpen] = useState(false);

        const categories = useMemo(() => ["전체", ...CATEGORY_ORDER], []);

        const categoryCounts = useMemo(() => {
          const counts = { 전체: posts.length };

          for (const category of CATEGORY_ORDER) {
            counts[category] = posts.filter((post) => post.category === category).length;
          }

          return counts;
        }, [posts]);

        const visiblePosts = useMemo(() => {
          const normalizedQuery = searchQuery.trim().toLowerCase();
          const filteredPosts = posts.filter((post) => {
            const matchesCategory = selectedCategory === "전체" || post.category === selectedCategory;
            const matchesSearch =
              normalizedQuery.length === 0 ||
              post.title.toLowerCase().includes(normalizedQuery) ||
              post.body.toLowerCase().includes(normalizedQuery);

            return matchesCategory && matchesSearch;
          });

          return sortPosts(filteredPosts, sortMode);
        }, [posts, selectedCategory, searchQuery, sortMode]);

        const selectedPost = useMemo(() => (
          posts.find((post) => post.id === selectedPostId) ?? null
        ), [posts, selectedPostId]);

        const featuredPosts = useMemo(() => {
          const sourcePosts = searchQuery.trim().length > 0 ? visiblePosts : posts;
          return sortPosts(sourcePosts, "popular").slice(0, 3);
        }, [posts, visiblePosts, searchQuery]);

        const summary = useMemo(() => ({
          totalPosts: posts.length,
          totalLikes: posts.reduce((sum, post) => sum + post.likes, 0),
          totalComments: posts.reduce((sum, post) => sum + post.comments, 0),
        }), [posts]);

        useEffect(() => {
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ isLoggedIn, posts }));
          } catch {
            // Ignore storage errors in the browser demo and keep the UI usable.
          }

          setSaveNotice(`자동 저장됨 · ${formatTimeLabel(new Date())}`);
        }, [isLoggedIn, posts]);

        useEffect(() => {
          if (composerMode !== "closed") {
            return;
          }

          if (visiblePosts.length === 0) {
            if (selectedPostId !== null) {
              setSelectedPostId(null);
            }
            return;
          }

          if (!visiblePosts.some((post) => post.id === selectedPostId)) {
            setSelectedPostId(visiblePosts[0].id);
          }
        }, [visiblePosts, selectedPostId, composerMode]);

        useEffect(() => {
          const screenTitle = composerMode === "create"
            ? "새 글 작성"
            : composerMode === "edit"
              ? "게시글 수정"
              : selectedPost?.title ?? props.communityName;

          document.title = `${screenTitle} · ${props.communityName}`;

          return () => {
            document.title = `${props.communityName} Demo`;
          };
        }, [composerMode, selectedPost, props.communityName]);

        function toggleLogin() {
          setIsLoggedIn((currentValue) => !currentValue);
          setComposerMode("closed");
          setDraftTitle("");
          setDraftBody("");
        }

        function selectPost(postId) {
          setSelectedPostId(postId);
          setComposerMode("closed");
        }

        function toggleLike(postId) {
          if (!isLoggedIn) {
            setSaveNotice("로그인 후 좋아요를 누를 수 있습니다.");
            return;
          }

          setPosts((currentPosts) => currentPosts.map((post) => {
            if (post.id !== postId) {
              return post;
            }

            const nextLiked = !post.liked;

            return {
              ...post,
              liked: nextLiked,
              likes: post.likes + (nextLiked ? 1 : -1),
            };
          }));
        }

        function openCreate() {
          if (!isLoggedIn) {
            setSaveNotice("로그인하면 새 글을 작성할 수 있습니다.");
            return;
          }

          setComposerMode("create");
          setDraftTitle("");
          setDraftBody("");
        }

        function openEdit(postId) {
          if (!isLoggedIn) {
            return;
          }

          const post = posts.find((entry) => entry.id === postId);

          if (!post) {
            return;
          }

          setSelectedPostId(postId);
          setDraftTitle(post.title);
          setDraftBody(post.body);
          setComposerMode("edit");
        }

        function closeComposer() {
          setComposerMode("closed");
          setDraftTitle("");
          setDraftBody("");
        }

        function saveDraft() {
          const normalizedTitle = draftTitle.trim();
          const normalizedBody = draftBody.trim();

          if (!normalizedTitle || !normalizedBody) {
            setSaveNotice("제목과 본문을 모두 입력해주세요.");
            return;
          }

          if (composerMode === "edit" && selectedPostId) {
            setPosts((currentPosts) => currentPosts.map((post) => (
              post.id === selectedPostId
                ? {
                  ...post,
                  title: normalizedTitle,
                  body: normalizedBody,
                }
                : post
            )));
            setSaveNotice("게시글을 수정했습니다.");
            setComposerMode("closed");
            return;
          }

          const nextPostId = `post-${Date.now()}`;
          const nextCategory = selectedCategory === "전체" ? "자유" : selectedCategory;

          const nextPost = {
            id: nextPostId,
            category: nextCategory,
            title: normalizedTitle,
            body: normalizedBody,
            author: CURRENT_USER,
            createdAt: new Date().toISOString(),
            views: 0,
            likes: 0,
            liked: false,
            comments: 0,
          };

          setPosts((currentPosts) => [nextPost, ...currentPosts]);
          setSelectedPostId(nextPostId);
          setComposerMode("closed");
          setDraftTitle("");
          setDraftBody("");
          setSaveNotice("새 게시글이 추가되었습니다.");
        }

        const currentCategoryLabel = composerMode === "edit"
          ? selectedPost?.category ?? "자유"
          : selectedCategory === "전체"
            ? "자유"
            : selectedCategory;

        const debugSnapshot = {
          isLoggedIn,
          composerMode,
          selectedCategory,
          sortMode,
          searchQuery,
          selectedPostId,
          totalPosts: posts.length,
          visiblePosts: visiblePosts.length,
          featuredPosts: featuredPosts.length,
          currentCategoryLabel,
          saveNotice,
        };

        return h("div", { className: "page-shell" }, compact([
          renderChild(TopBar, {
            isLoggedIn,
            searchQuery,
            onSearchChange: setSearchQuery,
            onToggleLogin: toggleLogin,
          }),
          !isLoggedIn
            ? renderChild(LoginHero, {
              featuredPosts,
              summary,
              onLogin: toggleLogin,
            })
            : h("div", { className: "service-grid" }, [
              h("aside", { className: "sidebar-stack" }, [
                renderChild(SidebarMenu, {
                  categories,
                  counts: categoryCounts,
                  selectedCategory,
                  onSelectCategory: setSelectedCategory,
                  onOpenCreate: openCreate,
                  isLoggedIn,
                  onToggleLogin: toggleLogin,
                  saveNotice,
                }),
              ]),
              h("section", { className: "main-stack" }, [
                h("section", { className: "board-card" }, [
                  h("div", { className: "board-header" }, [
                    h("div", { className: "board-title-row" }, [
                      h("h2", {}, [t("우리 동네 프론트엔드 게시판")]),
                      h("span", { className: "outline-tag" }, [t(`${props.communityName} demo`) ]),
                    ]),
                    h("p", { className: "muted" }, [t("검색, 정렬, 좋아요, 글쓰기, 수정을 하나의 루트 상태로 관리합니다.")]),
                  ]),
                  renderChild(BoardToolbar, {
                    selectedCategory,
                    totalCount: visiblePosts.length,
                    isLoggedIn,
                    sortMode,
                    sortOptions: SORT_OPTIONS,
                    onSortChange: setSortMode,
                    onOpenCreate: openCreate,
                  }),
                  renderChild(PostList, {
                    posts: visiblePosts,
                    selectedPostId,
                    onSelectPost: selectPost,
                  }),
                ]),
              ]),
              h("aside", { className: "detail-stack" }, [
                composerMode === "closed"
                  ? renderChild(PostDetail, {
                    post: selectedPost,
                    isLoggedIn,
                    onToggleLike: toggleLike,
                    onOpenEdit: openEdit,
                  })
                  : renderChild(ComposerPanel, {
                    mode: composerMode,
                    title: draftTitle,
                    body: draftBody,
                    categoryLabel: currentCategoryLabel,
                    onTitleChange: setDraftTitle,
                    onBodyChange: setDraftBody,
                    onSave: saveDraft,
                    onCancel: closeComposer,
                  }),
              ]),
            ]),
          h("section", { className: "footer-card" }, [
            h("strong", {}, [t("Week 5 체크 포인트")]),
            h("p", {}, [t("로그인 상태에 따라 화면이 바뀌고, 인기순에서 좋아요를 누르면 게시글 순서가 자연스럽게 다시 정렬됩니다.")]),
          ]),
          h("button", {
            type: "button",
            className: "debug-toggle",
            onclick: () => setIsDebugPanelOpen((open) => !open),
          }, [t(isDebugPanelOpen ? "디버그 닫기" : "디버그 열기")]),
          renderChild(DebugPanel, {
            open: isDebugPanelOpen,
            onToggle: () => setIsDebugPanelOpen((open) => !open),
            debugText: JSON.stringify(debugSnapshot, null, 2),
          }),
        ]));
      });

      Root.mount(document.getElementById("app"), {
        communityName: COMMUNITY_NAME,
      });
    </script>
  </body>
</html>
